app = "veeyds-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  ALLOWED_ORIGINS = "https://veeyds.vercel.app"
  API_BASE_URL = "https://veeyds-api.fly.dev"
